<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Księgowy Stripe</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] summary ~ * { animation: sweep .3s ease-in-out; }
        @keyframes sweep {
            0%    {opacity: 0; transform: translateY(-5px)}
            100%  {opacity: 1; transform: translateY(0)}
        }
        .chevron { transition: transform 0.3s ease; }
        details[open] summary .chevron { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-20 selection:bg-indigo-200">

    <script>
        const manifest = {
            name: "Stripe Raporty", short_name: "StripeRaport", display: "standalone",
            background_color: "#f8fafc", theme_color: "#4f46e5",
            icons: [{ src: "https://upload.wikimedia.org/wikipedia/commons/b/ba/Stripe_Logo%2C_revised_2016.svg", sizes: "192x192", type: "image/svg+xml" }]
        };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
        document.head.appendChild(link);
    </script>

    <header class="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <div class="flex items-center gap-2 font-bold text-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            Księgowy Stripe
        </div>
        <button id="btnToggleConfig" class="p-2 bg-indigo-500 rounded-full hover:bg-indigo-400 transition shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </button>
    </header>

    <main class="max-w-3xl mx-auto p-4 space-y-6">
        
        <div id="configPanel" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-semibold mb-2">Klucz API Stripe</h2>
            <input type="password" id="inputApiKey" placeholder="sk_live_..." class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none mb-3 font-mono text-sm">
            <button id="btnSaveConfig" class="w-full bg-slate-900 text-white font-medium p-3 rounded-xl hover:bg-slate-800 transition">Zapisz w telefonie</button>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex bg-slate-100 p-1 rounded-xl mb-5">
                <button id="tabMonth" class="flex-1 py-2 rounded-lg text-sm font-medium transition bg-white shadow-sm text-indigo-600">Miesiąc</button>
                <button id="tabCustom" class="flex-1 py-2 rounded-lg text-sm font-medium transition text-slate-500">Zakres dat</button>
            </div>

            <div id="modeMonth">
                <label class="block text-sm font-medium text-slate-700 mb-1">Wybierz miesiąc</label>
                <select id="selectMonth" class="w-full p-3 border border-slate-300 rounded-xl bg-white outline-none focus:ring-2 focus:ring-indigo-500"></select>
            </div>

            <div id="modeCustom" class="hidden flex gap-3">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Od</label>
                    <input type="date" id="inputStartDate" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Do</label>
                    <input type="date" id="inputEndDate" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>

            <button id="btnGenerate" class="w-full mt-5 bg-indigo-600 text-white font-medium p-3 rounded-xl hover:bg-indigo-700 flex justify-center items-center gap-2 transition disabled:opacity-70">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span id="btnGenerateText">Pobierz transakcje</span>
            </button>
        </div>

        <div id="errorMessage" class="hidden bg-red-50 text-red-700 p-4 rounded-xl border border-red-200 text-sm font-medium"></div>

        <div id="resultsContainer" class="hidden space-y-4">
            <div class="flex justify-between items-center mb-2 px-1">
                <h2 class="text-xl font-bold text-slate-800">Raport</h2>
                <button id="btnExportPdf" class="bg-emerald-500 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-emerald-600 flex items-center gap-2 transition shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> Zapisz PDF
                </button>
            </div>
            
            <!-- Baner złączną kwotą wszystkich przelewów -->
            <div id="grandTotalContainer" class="hidden bg-indigo-600 text-white p-5 rounded-2xl shadow-md flex justify-between items-center mb-4">
                <span class="font-medium text-indigo-100 uppercase tracking-wider text-sm">Suma przelewów:</span>
                <span id="grandTotalAmount" class="text-2xl font-black">0,00 PLN</span>
            </div>

            <div id="payoutsList" class="space-y-4"></div>
        </div>
    </main>

    <script>
        let currentData = [];
        let dateMode = 'month';

        const normalizeTextForPDF = (text) => {
            if (!text) return '';
            const map = {
                'ą': 'a', 'ć': 'c', 'ę': 'e', 'ł': 'l', 'ń': 'n', 'ó': 'o', 'ś': 's', 'ź': 'z', 'ż': 'z',
                'Ą': 'A', 'Ć': 'C', 'Ę': 'E', 'Ł': 'L', 'Ń': 'N', 'Ó': 'O', 'Ś': 'S', 'Ź': 'Z', 'Ż': 'Z'
            };
            return text.replace(/[ąćęłńóśźżĄĆĘŁŃÓŚŹŻ]/g, match => map[match] || match);
        };

        function getLocalYMD(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function getEaster(year) {
            const f = Math.floor, G = year % 19, C = f(year / 100);
            const H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30;
            const I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11));
            const J = (year + f(year / 4) + I + 2 - C + f(C / 4)) % 7;
            const L = I - J, month = 3 + f((L + 40) / 44), day = L + 28 - 31 * f(month / 4);
            return new Date(year, month - 1, day);
        }

        function isPolishHoliday(date) {
            const y = date.getFullYear(), m = date.getMonth(), d = date.getDate();
            const fixedHolidays = [[0,1], [0,6], [4,1], [4,3], [7,15], [10,1], [10,11], [11,25], [11,26]];
            for(let [fm, fd] of fixedHolidays) {
                if(m === fm && d === fd) return true;
            }
            const easter = getEaster(y);
            const easterMonday = new Date(y, easter.getMonth(), easter.getDate() + 1);
            const corpusChristi = new Date(y, easter.getMonth(), easter.getDate() + 60);
            
            if(m === easterMonday.getMonth() && d === easterMonday.getDate()) return true;
            if(m === corpusChristi.getMonth() && d === corpusChristi.getDate()) return true;
            
            return false;
        }

        function getAdjustedDateObj(timestamp) {
            let date = new Date(timestamp * 1000);
            date.setHours(12, 0, 0, 0); 
            date.setDate(date.getDate() - 1);
            while(date.getDay() === 0 || date.getDay() === 6 || isPolishHoliday(date)) {
                date.setDate(date.getDate() - 1);
            }
            date.setHours(0, 0, 0, 0);
            return date;
        }

        const configPanel = document.getElementById('configPanel');
        const btnToggleConfig = document.getElementById('btnToggleConfig');
        const inputApiKey = document.getElementById('inputApiKey');
        const btnSaveConfig = document.getElementById('btnSaveConfig');
        const tabMonth = document.getElementById('tabMonth');
        const tabCustom = document.getElementById('tabCustom');
        const modeMonth = document.getElementById('modeMonth');
        const modeCustom = document.getElementById('modeCustom');
        const selectMonth = document.getElementById('selectMonth');
        const inputStartDate = document.getElementById('inputStartDate');
        const inputEndDate = document.getElementById('inputEndDate');
        const btnGenerate = document.getElementById('btnGenerate');
        const btnGenerateText = document.getElementById('btnGenerateText');
        const errorMessage = document.getElementById('errorMessage');
        const resultsContainer = document.getElementById('resultsContainer');
        const payoutsList = document.getElementById('payoutsList');
        const btnExportPdf = document.getElementById('btnExportPdf');
        const grandTotalContainer = document.getElementById('grandTotalContainer');
        const grandTotalAmount = document.getElementById('grandTotalAmount');

        document.addEventListener('DOMContentLoaded', () => {
            const monthNamesPl = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
            for (let i = 0; i < 24; i++) {
                const d = new Date(); d.setMonth(d.getMonth() - i);
                const val = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');
                const label = monthNamesPl[d.getMonth()] + " " + d.getFullYear();
                selectMonth.add(new Option(label, val));
            }
            selectMonth.value = selectMonth.options[1].value;
            const savedKey = localStorage.getItem('stripe_api_key');
            if (savedKey) { inputApiKey.value = savedKey; configPanel.classList.add('hidden'); }
        });

        btnToggleConfig.addEventListener('click', () => configPanel.classList.toggle('hidden'));
        btnSaveConfig.addEventListener('click', () => {
            const key = inputApiKey.value.trim();
            if (key) { localStorage.setItem('stripe_api_key', key); configPanel.classList.add('hidden'); }
        });

        tabMonth.addEventListener('click', () => {
            dateMode = 'month';
            tabMonth.className = "flex-1 py-2 rounded-lg text-sm font-medium transition bg-white shadow-sm text-indigo-600";
            tabCustom.className = "flex-1 py-2 rounded-lg text-sm font-medium transition text-slate-500";
            modeMonth.classList.remove('hidden'); modeCustom.classList.add('hidden'); modeCustom.classList.remove('flex');
        });

        tabCustom.addEventListener('click', () => {
            dateMode = 'custom';
            tabCustom.className = "flex-1 py-2 rounded-lg text-sm font-medium transition bg-white shadow-sm text-indigo-600";
            tabMonth.className = "flex-1 py-2 rounded-lg text-sm font-medium transition text-slate-500";
            modeCustom.classList.remove('hidden'); modeCustom.classList.add('flex'); modeMonth.classList.add('hidden');
        });

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount) + ' PLN';
        };
        const formatDateTime = (timestamp) => new Date(timestamp * 1000).toLocaleString('pl-PL', { dateStyle: 'short', timeStyle: 'short' });

        btnGenerate.addEventListener('click', async () => {
            errorMessage.classList.add('hidden'); resultsContainer.classList.add('hidden');
            const apiKey = inputApiKey.value.trim();
            if(!apiKey) { errorMessage.textContent = 'Brak klucza API! Wpisz go w konfiguracji na samej górze.'; return errorMessage.classList.remove('hidden'); }

            let startStr, endStr;
            if (dateMode === 'month') {
                const val = selectMonth.value;
                if (!val) return;
                const [year, month] = val.split('-');
                startStr = getLocalYMD(new Date(year, parseInt(month) - 1, 1));
                endStr = getLocalYMD(new Date(year, parseInt(month), 0));
            } else {
                startStr = inputStartDate.value; endStr = inputEndDate.value;
                if (!startStr || !endStr) return;
            }

            btnGenerate.disabled = true; 
            btnGenerateText.textContent = "Łączenie ze Stripe...";

            const [sY, sM, sD] = startStr.split('-');
            let fetchStartObj = new Date(sY, sM - 1, sD);
            fetchStartObj.setDate(fetchStartObj.getDate() - 7);
            let fetchStartDate = getLocalYMD(fetchStartObj);

            const [eY, eM, eD] = endStr.split('-');
            let fetchEndObj = new Date(eY, eM - 1, eD);
            fetchEndObj.setDate(fetchEndObj.getDate() + 7);
            let fetchEndDate = getLocalYMD(fetchEndObj);

            if (apiKey.toLowerCase() === 'test') {
                setTimeout(() => {
                    const mockData = generateMockData(startStr);
                    filterAndRenderResults(mockData, startStr, endStr);
                    btnGenerate.disabled = false; btnGenerateText.textContent = "Pobierz transakcje";
                }, 800);
                return;
            }

            try {
                const response = await fetch('/.netlify/functions/stripe-api', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey, startDate: fetchStartDate, endDate: fetchEndDate })
                });
                
                if (!response.ok) {
                    if (response.status === 404) throw new Error('Nie odnaleziono pliku backendu na serwerze Netlify.');
                    const errData = await response.json(); 
                    throw new Error(errData.error || 'Błąd uwierzytelnienia w Stripe. Sprawdź klucz API.');
                }
                const rawData = await response.json();
                filterAndRenderResults(rawData, startStr, endStr);
            } catch (err) {
                errorMessage.textContent = err.message; errorMessage.classList.remove('hidden');
            } finally {
                btnGenerate.disabled = false; btnGenerateText.textContent = "Pobierz transakcje";
            }
        });

        function filterAndRenderResults(rawData, startStr, endStr) {
            const [sYear, sMonth, sDay] = startStr.split('-');
            const startObj = new Date(sYear, sMonth - 1, sDay, 0, 0, 0, 0);
            
            const [eYear, eMonth, eDay] = endStr.split('-');
            const endObjOriginal = new Date(eYear, eMonth - 1, eDay, 23, 59, 59, 999);

            currentData = rawData.filter(payout => {
                const adjDateObj = getAdjustedDateObj(payout.arrivalDate);
                return adjDateObj >= startObj && adjDateObj <= endObjOriginal;
            });

            currentData.sort((a, b) => getAdjustedDateObj(b.arrivalDate) - getAdjustedDateObj(a.arrivalDate));
            renderResults(currentData);
        }

        function renderResults(data) {
            payoutsList.innerHTML = '';
            
            if (data.length === 0) {
                grandTotalContainer.classList.add('hidden');
                payoutsList.innerHTML = '<div class="bg-white p-6 rounded-2xl text-center shadow-sm border border-slate-200"><p class="text-slate-500 font-medium">Brak wypłat księgowych w wybranym okresie.</p></div>';
            } else {
                grandTotalContainer.classList.remove('hidden');
                
                // Wyliczanie ogólnej sumy wszystkich przelewów w wybranym okresie
                const totalAmount = data.reduce((sum, payout) => sum + payout.amount, 0);
                grandTotalAmount.textContent = formatCurrency(Math.round(totalAmount * 100) / 100);

                data.forEach(payout => {
                    const sumBB = payout.transactions.reduce((sum, t) => sum + t.net, 0);
                    const sumBBFixed = Math.round(sumBB * 100) / 100;
                    const realArrivalDate = getAdjustedDateObj(payout.arrivalDate).toLocaleDateString('pl-PL');

                    const details = document.createElement('details');
                    details.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden group";
                    details.open = true;
                    
                    let txHtml = '';
                    payout.transactions.forEach((t) => {
                        txHtml += `
                            <div class="flex flex-col gap-2 p-3 border-t border-slate-100 hover:bg-slate-50 transition-colors">
                                <div class="flex flex-col mb-1">
                                    <span class="text-xs text-slate-500 font-medium whitespace-nowrap mb-1">${formatDateTime(t.created)}</span>
                                    <span class="text-sm font-semibold text-slate-700 leading-tight">${t.description}</span>
                                </div>
                                <div class="flex flex-wrap justify-between items-center text-xs gap-y-2">
                                    <div class="text-slate-500 w-1/2 sm:w-auto">
                                        Kwota: <span class="font-medium text-slate-700">${formatCurrency(t.amount)}</span>
                                    </div>
                                    <div class="text-red-400 w-1/2 sm:w-auto text-right sm:text-left">
                                        Prowizja: ${formatCurrency(Math.abs(t.fee))}
                                    </div>
                                    <div class="font-bold text-indigo-600 text-sm bg-indigo-50 px-2 py-1 rounded w-full sm:w-auto text-right sm:text-left mt-2 sm:mt-0 border border-indigo-100">
                                        Wypłacono: ${formatCurrency(t.net)}
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    details.innerHTML = `
                        <summary class="p-4 bg-indigo-50/50 hover:bg-indigo-50 cursor-pointer flex justify-between items-center outline-none border-b border-indigo-100 transition">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="bg-indigo-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-widest shadow-sm">Przelew od Stripe</span>
                                </div>
                                <p class="text-2xl font-black text-slate-800 tracking-tight">${formatCurrency(payout.amount)}</p>
                                <p class="text-sm text-slate-600 mt-1">Data wpływu na konto: <span class="font-bold text-slate-800">${realArrivalDate}</span></p>
                            </div>
                            <div class="bg-white p-2 rounded-full border border-indigo-100 shadow-sm shrink-0 ml-4">
                                <svg class="w-5 h-5 text-indigo-400 chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </summary>
                        
                        <div class="p-0 bg-white">
                            <div class="max-h-96 overflow-y-auto px-2">
                                ${txHtml}
                            </div>
                            <div class="bg-slate-50 p-4 border-t border-slate-200 flex flex-col sm:flex-row justify-between sm:items-center gap-2">
                                <span class="text-slate-500 font-medium text-xs uppercase tracking-wider">RAZEM (Suma wpłat transakcji):</span>
                                <span class="text-lg font-black text-slate-800 text-right">${formatCurrency(sumBBFixed)}</span>
                            </div>
                        </div>
                    `;
                    payoutsList.appendChild(details);
                });
            }
            resultsContainer.classList.remove('hidden');
        }

        btnExportPdf.addEventListener('click', () => {
            if (!currentData || currentData.length === 0) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4');
            let yPos = 40;

            doc.setFontSize(18);
            doc.text("Szczegolowy Raport Wyplat Stripe", 40, yPos);
            yPos += 30;

            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            
            let rangeText = "";
            if (dateMode === 'month') {
                const [y, m] = selectMonth.value.split('-');
                const monthNamesPdf = {
                    "01": "Styczen", "02": "Luty", "03": "Marzec", "04": "Kwiecien",
                    "05": "Maj", "06": "Czerwiec", "07": "Lipiec", "08": "Sierpien",
                    "09": "Wrzesien", "10": "Pazdziernik", "11": "Listopad", "12": "Grudzien"
                };
                rangeText = `Miesiac: ${monthNamesPdf[m]} ${y}`;
            } else {
                rangeText = `Okres: ${inputStartDate.value} do ${inputEndDate.value}`;
            }
            
            doc.text(rangeText, 40, yPos);
            yPos += 20;

            // --- NOWA SEKCJA: SUMA WSZYSTKICH PRZELEWÓW W PDF ---
            const totalAmount = currentData.reduce((sum, payout) => sum + payout.amount, 0);
            const totalAmountStr = formatCurrency(Math.round(totalAmount * 100) / 100);
            doc.text(`Suma przelewow: ${totalAmountStr}`, 40, yPos);
            
            // Powrót do normalnej czcionki
            doc.setFont("helvetica", "normal");
            yPos += 30;

            currentData.forEach((payout, index) => {
                const sumBB = payout.transactions.reduce((sum, t) => sum + t.net, 0);
                const sumBBFixed = Math.round(sumBB * 100) / 100;
                const realArrivalDate = getAdjustedDateObj(payout.arrivalDate).toLocaleDateString('pl-PL');

                doc.setFontSize(12);
                doc.setFont("helvetica", "bold");
                doc.setTextColor(79, 70, 229); 
                doc.text(`Przelew na konto: ${formatCurrency(payout.amount)}`, 40, yPos);
                
                doc.setFontSize(10);
                doc.setFont("helvetica", "normal");
                doc.setTextColor(0, 0, 0);
                yPos += 15;
                doc.text(`Data wplywu: ${realArrivalDate}`, 40, yPos);
                yPos += 10;

                const tableData = payout.transactions.map((t) => [
                    formatDateTime(t.created),
                    normalizeTextForPDF(t.description),
                    formatCurrency(t.amount),
                    formatCurrency(Math.abs(t.fee)),
                    formatCurrency(t.net)
                ]);

                tableData.push(['', '', 'RAZEM:', '', formatCurrency(sumBBFixed)]);

                doc.autoTable({
                    startY: yPos + 5,
                    head: [['Data Transakcji', 'Opis', 'Kwota', 'Prowizja', 'Wyplacono']],
                    body: tableData,
                    theme: 'grid',
                    styles: { fontSize: 8 },
                    headStyles: { fillColor: [241, 245, 249], textColor: [71, 85, 105] }, 
                    columnStyles: { 1: { cellWidth: 'auto' } },
                    margin: { left: 40, right: 40 },
                    didParseCell: function (data) {
                        if (data.row.index === tableData.length - 1) {
                            data.cell.styles.fontStyle = 'bold';
                            data.cell.styles.textColor = [79, 70, 229];
                        }
                    }
                });

                yPos = doc.lastAutoTable.finalY + 40;

                if (yPos > 700 && index < currentData.length - 1) {
                    doc.addPage();
                    yPos = 40;
                }
            });

            doc.save(`Stripe_Raport_${dateMode === 'month' ? selectMonth.value : inputStartDate.value}.pdf`);
        });
